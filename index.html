<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharmacy Ratio Tracker</title>
<style>
/* ── Reset & Base ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #16a34a;
  --green-bg: #dcfce7;
  --green-border: #86efac;
  --yellow: #ca8a04;
  --yellow-bg: #fef9c3;
  --yellow-border: #fde047;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --red-border: #fca5a5;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7285;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --gray-900: #111827;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.04);
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Top Bar ─────────────────────────────────────────────────── */
.top-bar {
  background: var(--gray-900);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -.3px;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.top-bar .role-select {
  background: var(--gray-700);
  color: #fff;
  border: 1px solid var(--gray-600);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
}

.top-bar .btn-admin {
  background: var(--gray-700);
  color: #fff;
  border: 1px solid var(--gray-600);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
}
.top-bar .btn-admin:hover { background: var(--gray-600); }

/* ── Overall Ratio Banner ────────────────────────────────────── */
.overall-banner {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  font-weight: 600;
  font-size: 15px;
  transition: background .3s, color .3s;
}
.overall-banner.status-green  { background: var(--green-bg); color: var(--green); }
.overall-banner.status-yellow { background: var(--yellow-bg); color: var(--yellow); }
.overall-banner.status-red    { background: var(--red-bg); color: var(--red); }

.overall-banner .ratio-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
}
.status-green .ratio-pill  { background: var(--green); color: #fff; }
.status-yellow .ratio-pill { background: var(--yellow); color: #fff; }
.status-red .ratio-pill    { background: var(--red); color: #fff; }

/* ── Main Layout ─────────────────────────────────────────────── */
.main-layout {
  display: flex;
  gap: 0;
  max-width: 1600px;
  margin: 0 auto;
}

.departments-area {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

.log-panel {
  width: 340px;
  flex-shrink: 0;
  background: #fff;
  border-left: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 110px);
  position: sticky;
  top: 110px;
}

.log-panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-200);
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.log-panel-header .btn-clear-log {
  font-size: 12px;
  color: var(--gray-400);
  background: none;
  border: none;
  cursor: pointer;
}
.log-panel-header .btn-clear-log:hover { color: var(--gray-600); }

.log-entries {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.log-entry {
  padding: 8px 16px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
  line-height: 1.4;
}

.log-entry .log-time {
  color: var(--gray-400);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.log-entry .log-name {
  font-weight: 600;
}

.log-entry .log-dept {
  color: var(--gray-400);
  font-size: 11px;
}

/* ── Department Card ─────────────────────────────────────────── */
.dept-card {
  background: #fff;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .2s;
}

.dept-header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  transition: background .3s, color .3s;
}
.dept-header.status-green  { background: var(--green-bg); color: var(--green); border-bottom: 2px solid var(--green-border); }
.dept-header.status-yellow { background: var(--yellow-bg); color: var(--yellow); border-bottom: 2px solid var(--yellow-border); }
.dept-header.status-red    { background: var(--red-bg); color: var(--red); border-bottom: 2px solid var(--red-border); }

.dept-header h2 { font-size: 16px; font-weight: 700; }

.dept-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  font-weight: 600;
}

.dept-ratio {
  font-size: 20px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

.dept-body { padding: 12px 20px 20px; }

.role-section { margin-bottom: 12px; }
.role-section:last-child { margin-bottom: 0; }

.role-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--gray-400);
  font-weight: 700;
  margin-bottom: 6px;
}

.staff-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* ── Staff Chip ──────────────────────────────────────────────── */
.staff-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-height: 42px;
}
.staff-chip:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.staff-chip:active { transform: translateY(0); }

.staff-chip .chip-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.staff-chip.status-working       { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.staff-chip.status-working .chip-dot { background: var(--green); }

.staff-chip.status-lunch         { background: #fef3c7; border-color: #fcd34d; color: #b45309; }
.staff-chip.status-lunch .chip-dot   { background: #f59e0b; }

.staff-chip.status-meeting       { background: var(--blue-light); border-color: #93c5fd; color: #1d4ed8; }
.staff-chip.status-meeting .chip-dot { background: var(--blue); }

.staff-chip.status-out           { background: var(--gray-100); border-color: var(--gray-200); color: var(--gray-400); }
.staff-chip.status-out .chip-dot     { background: var(--gray-300); }

.staff-chip.status-nontech       { background: #f3e8ff; border-color: #c4b5fd; color: #7c3aed; }
.staff-chip.status-nontech .chip-dot { background: #8b5cf6; }

.staff-chip.disabled {
  cursor: default;
  opacity: .75;
}
.staff-chip.disabled:hover { box-shadow: none; transform: none; }

/* ── Status Modal ────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal-card {
  background: #fff;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 420px;
  padding: 24px 20px 32px;
  transform: translateY(100%);
  transition: transform .25s ease-out;
}
.modal-overlay.open .modal-card {
  transform: translateY(0);
}

.modal-name {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}

.modal-dept {
  font-size: 13px;
  color: var(--gray-400);
  margin-bottom: 16px;
}

.modal-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.modal-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1.5px solid var(--gray-200);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  background: #fff;
  -webkit-tap-highlight-color: transparent;
}
.modal-option:hover { border-color: var(--gray-300); background: var(--gray-50); }
.modal-option:active { background: var(--gray-100); }
.modal-option.selected { border-color: var(--blue); background: var(--blue-light); }

.modal-option .opt-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.modal-close {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  border-radius: var(--radius);
  border: none;
  background: var(--gray-100);
  color: var(--gray-600);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.modal-close:hover { background: var(--gray-200); }

/* ── Admin / Schedule Panel ──────────────────────────────────── */
.admin-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.admin-overlay.open { opacity: 1; pointer-events: auto; }

.admin-panel {
  background: #fff;
  border-radius: var(--radius-lg);
  width: 95%;
  max-width: 900px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  padding: 24px;
  transform: scale(.95);
  transition: transform .2s;
}
.admin-overlay.open .admin-panel { transform: scale(1); }

.admin-panel h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

.admin-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 2px solid var(--gray-200);
}

.admin-tab {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--gray-400);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color .15s;
}
.admin-tab:hover { color: var(--gray-600); }
.admin-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

.admin-section { display: none; }
.admin-section.active { display: block; }

/* Staff management */
.staff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.staff-table th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid var(--gray-200);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--gray-400);
}

.staff-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--gray-100);
}

.staff-table tr:hover td { background: var(--gray-50); }

.staff-table .btn-remove {
  color: var(--red);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}

.add-staff-form {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.add-staff-form input, .add-staff-form select {
  padding: 8px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: 6px;
  font-size: 14px;
}
.add-staff-form input:focus, .add-staff-form select:focus {
  outline: none;
  border-color: var(--blue);
}

.btn-primary {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover { opacity: .9; }

.btn-secondary {
  background: var(--gray-100);
  color: var(--gray-600);
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-secondary:hover { background: var(--gray-200); }

/* Schedule section */
.schedule-controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.schedule-controls select, .schedule-controls input {
  padding: 8px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: 6px;
  font-size: 14px;
}

.schedule-grid {
  overflow-x: auto;
}

.schedule-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 600px;
}

.schedule-table th {
  padding: 6px 4px;
  border-bottom: 2px solid var(--gray-200);
  font-size: 11px;
  text-align: center;
  color: var(--gray-400);
  position: sticky;
  top: 0;
  background: #fff;
}

.schedule-table th.name-col {
  text-align: left;
  min-width: 140px;
}

.schedule-table td {
  padding: 4px;
  border-bottom: 1px solid var(--gray-100);
  text-align: center;
}

.schedule-table td.name-cell {
  text-align: left;
  font-weight: 500;
  padding-left: 8px;
}

.schedule-table .day-check {
  width: 28px;
  height: 28px;
  cursor: pointer;
  accent-color: var(--blue);
}

.schedule-dept-section { margin-bottom: 20px; }

.schedule-dept-section h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--gray-600);
}

.schedule-month-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.schedule-month-nav button {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 14px;
}
.schedule-month-nav button:hover { background: var(--gray-200); }

.schedule-month-nav .month-label {
  font-weight: 700;
  font-size: 15px;
  min-width: 160px;
  text-align: center;
}

/* ── Mobile Log Toggle ───────────────────────────────────────── */
.log-toggle-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 150;
  background: var(--gray-900);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 52px;
  height: 52px;
  font-size: 20px;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  align-items: center;
  justify-content: center;
}

.log-badge {
  position: absolute;
  top: -2px; right: -2px;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Legend ───────────────────────────────────────────────────── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 8px 20px 12px;
  font-size: 12px;
  color: var(--gray-500);
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  .main-layout { flex-direction: column; }

  .log-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 320px;
    height: 100vh;
    transform: translateX(100%);
    transition: transform .25s;
    z-index: 180;
    box-shadow: var(--shadow-lg);
  }
  .log-panel.open { transform: translateX(0); }

  .log-toggle-btn { display: flex; }

  .departments-area { padding: 12px; }

  .overall-banner { font-size: 13px; gap: 12px; padding: 12px 16px; }
}

@media (max-width: 480px) {
  .top-bar { padding: 10px 14px; }
  .top-bar h1 { font-size: 15px; }
  .dept-header { padding: 10px 14px; }
  .dept-body { padding: 10px 14px 14px; }
  .staff-chip { padding: 7px 10px; font-size: 12px; min-height: 38px; }
  .modal-card { padding: 20px 16px 28px; }
}
</style>
</head>
<body>

<!-- ── Top Bar ──────────────────────────────────────────────── -->
<header class="top-bar">
  <h1>Pharmacy Ratio Tracker</h1>
  <div class="top-bar-right">
    <select class="role-select" id="roleSelect" title="Select your identity">
      <option value="">-- Select Your Name --</option>
    </select>
    <button class="btn-admin" id="adminBtn" title="Manage staff &amp; schedules">Admin</button>
  </div>
</header>

<!-- ── Overall Banner ──────────────────────────────────────── -->
<div class="overall-banner status-green" id="overallBanner">
  <span>Overall Pharmacy Ratio</span>
  <span class="ratio-pill" id="overallRatio">—</span>
  <span id="overallLabel">Loading…</span>
</div>

<!-- ── Legend ───────────────────────────────────────────────── -->
<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span> Working</span>
  <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> At Lunch</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span> In Meeting</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--gray-300)"></span> Out / Called Off</span>
  <span class="legend-item"><span class="legend-dot" style="background:#8b5cf6"></span> Non-Tech Function</span>
</div>

<!-- ── Main Layout ─────────────────────────────────────────── -->
<div class="main-layout">
  <div class="departments-area" id="departmentsArea">
    <!-- rendered by JS -->
  </div>

  <aside class="log-panel" id="logPanel">
    <div class="log-panel-header">
      Activity Log
      <button class="btn-clear-log" id="clearLogBtn">Clear</button>
    </div>
    <div class="log-entries" id="logEntries">
      <!-- rendered by JS -->
    </div>
  </aside>
</div>

<!-- Mobile log toggle -->
<button class="log-toggle-btn" id="logToggleBtn" title="Activity Log">
  <span>&#128221;</span>
  <span class="log-badge" id="logBadge" style="display:none">0</span>
</button>

<!-- ── Status Change Modal ─────────────────────────────────── -->
<div class="modal-overlay" id="statusModal">
  <div class="modal-card">
    <div class="modal-name" id="modalName"></div>
    <div class="modal-dept" id="modalDept"></div>
    <div class="modal-options" id="modalOptions"></div>
    <button class="modal-close" id="modalClose">Cancel</button>
  </div>
</div>

<!-- ── Admin Panel ─────────────────────────────────────────── -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Administration</h2>
      <button class="btn-secondary" id="adminClose">Close</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="staff">Staff</button>
      <button class="admin-tab" data-tab="schedule">Monthly Schedule</button>
    </div>

    <!-- Staff Management Tab -->
    <div class="admin-section active" id="adminStaff">
      <table class="staff-table" id="staffTable">
        <thead>
          <tr><th>Name</th><th>Role</th><th>Department</th><th></th></tr>
        </thead>
        <tbody id="staffTableBody"></tbody>
      </table>
      <div class="add-staff-form" id="addStaffForm">
        <input type="text" id="newName" placeholder="Full name">
        <select id="newRole">
          <option value="pharmacist">Pharmacist</option>
          <option value="tech">Pharmacy Tech</option>
        </select>
        <select id="newDept">
          <option value="home_infusion">Home Infusion</option>
          <option value="hospice">Hospice</option>
          <option value="specialty">Specialty Pharmacy</option>
        </select>
        <button class="btn-primary" id="addStaffBtn">Add Staff</button>
      </div>
    </div>

    <!-- Schedule Tab -->
    <div class="admin-section" id="adminSchedule">
      <div class="schedule-controls">
        <div class="schedule-month-nav">
          <button id="prevMonth">&larr;</button>
          <span class="month-label" id="scheduleMonthLabel"></span>
          <button id="nextMonth">&rarr;</button>
        </div>
        <button class="btn-primary" id="applyScheduleBtn">Apply Today's Schedule</button>
      </div>
      <div class="schedule-grid" id="scheduleGrid">
        <!-- rendered by JS -->
      </div>
    </div>
  </div>
</div>

<script>
// ─── Data Model ──────────────────────────────────────────────────
const STATUSES = {
  working:  { label: 'In / Working',      cssClass: 'status-working',  dot: '#16a34a', countsRPh: true,  countsTech: true  },
  lunch:    { label: 'At Lunch',           cssClass: 'status-lunch',    dot: '#f59e0b', countsRPh: false, countsTech: false },
  meeting:  { label: 'In a Meeting',       cssClass: 'status-meeting',  dot: '#2563eb', countsRPh: false, countsTech: false },
  out:      { label: 'Left Early / Out',   cssClass: 'status-out',      dot: '#9ca3af', countsRPh: false, countsTech: false },
  nontech:  { label: 'Non-Tech Function',  cssClass: 'status-nontech',  dot: '#8b5cf6', countsRPh: false, countsTech: false },
};

  { id: 'home_infusion', name: 'Home Infusion' },
  { id: 'hospice',       name: 'Hospice' },
  { id: 'specialty',     name: 'Specialty Pharmacy' },
];

const MAX_RATIO = 3; // max techs per pharmacist

  { id: 's3',  name: 'Pharmacist 3',  role: 'pharmacist', dept: 'home_infusion' },
  { id: 's4',  name: 'Pharmacist 4',  role: 'pharmacist', dept: 'home_infusion' },

  { id: 's6',  name: 'Tech 1',        role: 'tech',       dept: 'home_infusion' },
  { id: 's7',  name: 'Tech 2',        role: 'tech',       dept: 'home_infusion' },
  { id: 's8',  name: 'Tech 3',        role: 'tech',       dept: 'home_infusion' },
  { id: 's9',  name: 'Tech 4',        role: 'tech',       dept: 'home_infusion' },
  { id: 's10', name: 'Tech 5',        role: 'tech',       dept: 'home_infusion' },

  { id: 's15', name: 'Pharmacist 9',  role: 'pharmacist', dept: 'hospice' },
  { id: 's16', name: 'Tech 7',        role: 'tech',       dept: 'hospice' },
  { id: 's17', name: 'Tech 8',        role: 'tech',       dept: 'hospice' },
  { id: 's18', name: 'Tech 9',        role: 'tech',       dept: 'hospice' },
  { id: 's19', name: 'Tech 10',       role: 'tech',       dept: 'hospice' },

// ─── State ──────────────────────────────────────────────────────
let state = loadState();

function defaultState() {
  const staff = JSON.parse(JSON.stringify(DEFAULT_STAFF));
  const statuses = {};
  staff.forEach(s => { statuses[s.id] = 'working'; });
  return {
    staff,
    statuses,
    log: [],
    schedule: {},
    nextId: 100,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem('pharmacyRatioTracker');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.staff && parsed.statuses) return parsed;
    }
  } catch(e) { /* ignore */ }
  return defaultState();
}

function saveState() {
  localStorage.setItem('pharmacyRatioTracker', JSON.stringify(state));
}

// ─── Ratio Calculation ──────────────────────────────────────────
function calcDeptRatio(deptId) {
  const deptStaff = state.staff.filter(s => s.dept === deptId);
  let activeRPh = 0;
  let activeTech = 0;
  deptStaff.forEach(s => {
    const st = state.statuses[s.id] || 'out';
    if (s.role === 'pharmacist' && STATUSES[st].countsRPh) activeRPh++;
    if (s.role === 'tech' && STATUSES[st].countsTech) activeTech++;
  });
  const maxTechs = activeRPh * MAX_RATIO;
  const overBy = Math.max(0, activeTech - maxTechs);
  let status = 'green';
  if (overBy > 0) {
    status = 'red';
  } else if (activeRPh > 0 && activeTech >= maxTechs) {
    status = 'yellow';
  } else if (activeRPh === 0 && activeTech > 0) {
    status = 'red';
  } else if (activeRPh > 0 && activeTech === maxTechs - 1) {
    status = 'yellow';
  }
  return { activeRPh, activeTech, maxTechs, overBy, status };
}

function calcOverall() {
  let totalRPh = 0, totalTech = 0;
  DEPARTMENTS.forEach(d => {
    const r = calcDeptRatio(d.id);
    totalRPh += r.activeRPh;
    totalTech += r.activeTech;
  });
  const maxTechs = totalRPh * MAX_RATIO;
  const overBy = Math.max(0, totalTech - maxTechs);
  let status = 'green';
  if (overBy > 0) {
    status = 'red';
  } else if (totalRPh > 0 && totalTech >= maxTechs) {
    status = 'yellow';
  } else if (totalRPh === 0 && totalTech > 0) {
    status = 'red';
  } else if (totalRPh > 0 && totalTech === maxTechs - 1) {
    status = 'yellow';
  }
  return { totalRPh, totalTech, maxTechs, overBy, status };
}

// ─── Permissions ────────────────────────────────────────────────
function getCurrentRole() {
  return document.getElementById('roleSelect').value;
}

function canEditPerson(targetId) {
  const selectedId = getCurrentRole();
  if (!selectedId) return true; // no identity selected = full access for demo
  const currentUser = state.staff.find(s => s.id === selectedId);
  if (!currentUser) return true;
  if (currentUser.role === 'pharmacist') return true; // pharmacists can edit anyone
  return selectedId === targetId; // techs can only edit themselves
}

// ─── Log ────────────────────────────────────────────────────────
let unseenLogCount = 0;

function addLog(personName, dept, oldStatus, newStatus) {
  const now = new Date();
  const entry = {
    time: now.toISOString(),
    name: personName,
    dept,
    from: oldStatus,
    to: newStatus,
  };
  state.log.unshift(entry);
  if (state.log.length > 500) state.log.length = 500; // cap
  saveState();
  renderLog();

  // badge for mobile
  const logPanel = document.getElementById('logPanel');
  if (window.innerWidth <= 900 && !logPanel.classList.contains('open')) {
    unseenLogCount++;
    const badge = document.getElementById('logBadge');
    badge.textContent = unseenLogCount;
    badge.style.display = 'flex';
  }
}

function renderLog() {
  const container = document.getElementById('logEntries');
  container.innerHTML = state.log.map(e => {
    const d = new Date(e.time);
    const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const deptName = DEPARTMENTS.find(dep => dep.id === e.dept)?.name || e.dept;
    return `<div class="log-entry">
      <span class="log-time">${dateStr} ${timeStr}</span>
      <br><span class="log-name">${esc(e.name)}</span>
      <span class="log-dept">${esc(deptName)}</span>
      <br>${STATUSES[e.from]?.label || e.from} &rarr; ${STATUSES[e.to]?.label || e.to}
    </div>`;
  }).join('');
}

// ─── Render Departments ─────────────────────────────────────────
function render() {
  renderDepartments();
  renderOverall();
  renderRoleSelect();
  renderLog();
}

function renderDepartments() {
  const area = document.getElementById('departmentsArea');
  area.innerHTML = DEPARTMENTS.map(dept => {
    const ratio = calcDeptRatio(dept.id);
    const pharmacists = state.staff.filter(s => s.dept === dept.id && s.role === 'pharmacist');
    const techs = state.staff.filter(s => s.dept === dept.id && s.role === 'tech');

    return `<div class="dept-card">
      <div class="dept-header status-${ratio.status}">
        <div>
          <h2>${esc(dept.name)}</h2>
        </div>
        <div class="dept-stats">
          <span>RPh: ${ratio.activeRPh}</span>
          <span>Tech: ${ratio.activeTech} / ${ratio.maxTechs} max</span>
          <span class="dept-ratio">${ratio.activeRPh}:${ratio.activeTech}</span>
          ${ratio.overBy > 0 ? `<span style="font-size:12px">(${ratio.overBy} over)</span>` : ''}
        </div>
      </div>
      <div class="dept-body">
        <div class="role-section">
          <div class="role-label">Pharmacists</div>
          <div class="staff-grid">
            ${pharmacists.map(s => renderChip(s)).join('')}
          </div>
        </div>
        <div class="role-section">
          <div class="role-label">Pharmacy Technicians</div>
          <div class="staff-grid">
            ${techs.map(s => renderChip(s)).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Attach click handlers
  area.querySelectorAll('.staff-chip:not(.disabled)').forEach(chip => {
    chip.addEventListener('click', () => openStatusModal(chip.dataset.id));
  });
}

function renderChip(person) {
  const st = state.statuses[person.id] || 'out';
  const info = STATUSES[st];
  const editable = canEditPerson(person.id);
  return `<div class="staff-chip ${info.cssClass} ${editable ? '' : 'disabled'}" data-id="${person.id}">
    <span class="chip-dot"></span>
    ${esc(person.name)}
  </div>`;
}

function renderOverall() {
  const o = calcOverall();
  const banner = document.getElementById('overallBanner');
  banner.className = `overall-banner status-${o.status}`;
  document.getElementById('overallRatio').textContent = `${o.totalRPh} RPh : ${o.totalTech} Tech`;
  const labels = {
    green: 'All departments within ratio',
    yellow: 'Approaching ratio limit',
    red: `OVER RATIO — ${o.overBy} tech(s) must be reassigned`,
  };
  document.getElementById('overallLabel').textContent = labels[o.status];
}

function renderRoleSelect() {
  const sel = document.getElementById('roleSelect');
  const current = sel.value;
  const opts = ['<option value="">-- Select Your Name --</option>'];
  DEPARTMENTS.forEach(dept => {
    const people = state.staff.filter(s => s.dept === dept.id);
    if (people.length) {
      opts.push(`<optgroup label="${esc(dept.name)}">`);
      people.forEach(p => {
        opts.push(`<option value="${p.id}" ${p.id === current ? 'selected' : ''}>${esc(p.name)} (${p.role === 'pharmacist' ? 'RPh' : 'Tech'})</option>`);
      });
      opts.push('</optgroup>');
    }
  });
  sel.innerHTML = opts.join('');
}

// ─── Status Modal ───────────────────────────────────────────────
let modalTarget = null;

function openStatusModal(personId) {
  if (!canEditPerson(personId)) return;
  const person = state.staff.find(s => s.id === personId);
  if (!person) return;
  modalTarget = personId;
  const dept = DEPARTMENTS.find(d => d.id === person.dept);
  document.getElementById('modalName').textContent = person.name;
  document.getElementById('modalDept').textContent = `${dept?.name || ''} — ${person.role === 'pharmacist' ? 'Pharmacist' : 'Pharmacy Tech'}`;

  const currentSt = state.statuses[personId] || 'out';
  const available = person.role === 'pharmacist'
    ? ['working', 'lunch', 'meeting', 'out']
    : ['working', 'lunch', 'meeting', 'out', 'nontech'];

  const optsContainer = document.getElementById('modalOptions');
  optsContainer.innerHTML = available.map(key => {
    const info = STATUSES[key];
    return `<div class="modal-option ${key === currentSt ? 'selected' : ''}" data-status="${key}">
      <span class="opt-dot" style="background:${info.dot}"></span>
      ${info.label}
    </div>`;
  }).join('');

  optsContainer.querySelectorAll('.modal-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const newSt = opt.dataset.status;
      const oldSt = state.statuses[personId];
      if (newSt !== oldSt) {
        state.statuses[personId] = newSt;
        saveState();
        addLog(person.name, person.dept, oldSt, newSt);
        renderDepartments();
        renderOverall();
      }
      closeStatusModal();
    });
  });

  document.getElementById('statusModal').classList.add('open');
}

function closeStatusModal() {
  document.getElementById('statusModal').classList.remove('open');
  modalTarget = null;
}

document.getElementById('modalClose').addEventListener('click', closeStatusModal);
document.getElementById('statusModal').addEventListener('click', e => {
  if (e.target === document.getElementById('statusModal')) closeStatusModal();
});

// ─── Admin Panel ────────────────────────────────────────────────
document.getElementById('adminBtn').addEventListener('click', () => {
  renderStaffTable();
  renderSchedule();
  document.getElementById('adminOverlay').classList.add('open');
});

document.getElementById('adminClose').addEventListener('click', () => {
  document.getElementById('adminOverlay').classList.remove('open');
  render();
});

document.getElementById('adminOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('adminOverlay')) {
    document.getElementById('adminOverlay').classList.remove('open');
    render();
  }
});

// Tabs
document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab === 'staff' ? 'adminStaff' : 'adminSchedule').classList.add('active');
  });
});

function renderStaffTable() {
  const tbody = document.getElementById('staffTableBody');
  tbody.innerHTML = state.staff.map(s => {
    const dept = DEPARTMENTS.find(d => d.id === s.dept);
    return `<tr>
      <td>${esc(s.name)}</td>
      <td>${s.role === 'pharmacist' ? 'Pharmacist' : 'Pharmacy Tech'}</td>
      <td>${esc(dept?.name || s.dept)}</td>
      <td><button class="btn-remove" data-id="${s.id}">Remove</button></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const person = state.staff.find(s => s.id === id);
      if (person && confirm(`Remove ${person.name}?`)) {
        state.staff = state.staff.filter(s => s.id !== id);
        delete state.statuses[id];
        saveState();
        renderStaffTable();
      }
    });
  });
}

document.getElementById('addStaffBtn').addEventListener('click', () => {
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value;
  const dept = document.getElementById('newDept').value;
  if (!name) return alert('Please enter a name.');
  const id = 's' + (state.nextId++);
  state.staff.push({ id, name, role, dept });
  state.statuses[id] = 'out';
  saveState();
  document.getElementById('newName').value = '';
  renderStaffTable();
});

// ─── Monthly Schedule ───────────────────────────────────────────
let scheduleYear, scheduleMonth;

function initScheduleMonth() {
  const now = new Date();
  scheduleYear = now.getFullYear();
  scheduleMonth = now.getMonth();
}
initScheduleMonth();

document.getElementById('prevMonth').addEventListener('click', () => {
  scheduleMonth--;
  if (scheduleMonth < 0) { scheduleMonth = 11; scheduleYear--; }
  renderSchedule();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  scheduleMonth++;
  if (scheduleMonth > 11) { scheduleMonth = 0; scheduleYear++; }
  renderSchedule();
});

function getScheduleKey(year, month) {
  return `${year}-${String(month + 1).padStart(2, '0')}`;
}

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function renderSchedule() {
  const key = getScheduleKey(scheduleYear, scheduleMonth);
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('scheduleMonthLabel').textContent = `${monthNames[scheduleMonth]} ${scheduleYear}`;

  const days = getDaysInMonth(scheduleYear, scheduleMonth);
  if (!state.schedule[key]) state.schedule[key] = {};
  const sched = state.schedule[key];

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const grid = document.getElementById('scheduleGrid');
  let html = '';

  DEPARTMENTS.forEach(dept => {
    const people = state.staff.filter(s => s.dept === dept.id);
    if (!people.length) return;

    html += `<div class="schedule-dept-section"><h3>${esc(dept.name)}</h3>`;
    html += `<div style="overflow-x:auto"><table class="schedule-table"><thead><tr><th class="name-col">Name</th>`;
    for (let d = 1; d <= days; d++) {
      const dow = new Date(scheduleYear, scheduleMonth, d).getDay();
      const isWeekend = dow === 0 || dow === 6;
      html += `<th style="${isWeekend ? 'color:var(--red);' : ''}">${d}<br><span style="font-weight:400">${dayNames[dow]}</span></th>`;
    }
    html += `</tr></thead><tbody>`;

    people.forEach(p => {
      if (!sched[p.id]) sched[p.id] = {};
      html += `<tr><td class="name-cell">${esc(p.name)}<br><span style="font-size:11px;color:var(--gray-400)">${p.role === 'pharmacist' ? 'RPh' : 'Tech'}</span></td>`;
      for (let d = 1; d <= days; d++) {
        const checked = sched[p.id][d] ? 'checked' : '';
        html += `<td><input type="checkbox" class="day-check" data-person="${p.id}" data-day="${d}" ${checked}></td>`;
      }
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  });

  grid.innerHTML = html;

  // Bind checkbox changes
  grid.querySelectorAll('.day-check').forEach(cb => {
    cb.addEventListener('change', () => {
      const pid = cb.dataset.person;
      const day = parseInt(cb.dataset.day);
      const key2 = getScheduleKey(scheduleYear, scheduleMonth);
      if (!state.schedule[key2]) state.schedule[key2] = {};
      if (!state.schedule[key2][pid]) state.schedule[key2][pid] = {};
      state.schedule[key2][pid][day] = cb.checked;
      saveState();
    });
  });
}

// Apply today's schedule
document.getElementById('applyScheduleBtn').addEventListener('click', () => {
  const now = new Date();
  const key = getScheduleKey(now.getFullYear(), now.getMonth());
  const day = now.getDate();
  const sched = state.schedule[key];
  if (!sched) {
    alert('No schedule data for this month. Please set up the schedule first.');
    return;
  }

  let applied = 0;
  state.staff.forEach(p => {
    const isScheduled = sched[p.id] && sched[p.id][day];
    const oldSt = state.statuses[p.id];
    const newSt = isScheduled ? 'working' : 'out';
    if (oldSt !== newSt) {
      state.statuses[p.id] = newSt;
      addLog(p.name, p.dept, oldSt, newSt);
      applied++;
    }
  });

  saveState();
  alert(`Schedule applied for today (${now.toLocaleDateString()}). ${applied} status(es) updated.`);
  document.getElementById('adminOverlay').classList.remove('open');
  render();
});

// ─── Mobile Log Toggle ──────────────────────────────────────────
document.getElementById('logToggleBtn').addEventListener('click', () => {
  const panel = document.getElementById('logPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    unseenLogCount = 0;
    document.getElementById('logBadge').style.display = 'none';
  }
});

// Close log on outside click (mobile)
document.addEventListener('click', e => {
  const panel = document.getElementById('logPanel');
  const toggle = document.getElementById('logToggleBtn');
  if (window.innerWidth <= 900 && panel.classList.contains('open') &&
      !panel.contains(e.target) && !toggle.contains(e.target)) {
    panel.classList.remove('open');
  }
});

// ─── Clear Log ──────────────────────────────────────────────────
document.getElementById('clearLogBtn').addEventListener('click', () => {
  if (confirm('Clear entire activity log?')) {
    state.log = [];
    saveState();
    renderLog();
  }
});

// ─── Role select re-render ──────────────────────────────────────
document.getElementById('roleSelect').addEventListener('change', () => {
  renderDepartments();
});

// ─── Utilities ──────────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ─── Init ───────────────────────────────────────────────────────
render();
</script>
